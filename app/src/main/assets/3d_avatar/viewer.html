<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #0f172a; }
        #canvas-container { width: 100vw; height: 100vh; }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #facc15; font-family: sans-serif; font-weight: bold; font-size: 15px; text-align: center;
        }
    </style>
</head>
<body>
    <div id="loading">⚡ Loading 3D Avatar & Human Hands guide...</div>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/fflate.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls;
        let fullAvatarModel = null;
        let leftHandModel = null, rightHandModel = null;
        let groundPedestal = null;
        let mixer, idleAction, waveAction;
        let waveIntervalTimer = null;
        let clock = new THREE.Clock();
        let currentMode = 'FULL_BODY';
        
        // Store finger joint references for dynamic postures
        let leftJoints = {}, rightJoints = {};
        
        // Dynamic Loop State
        let loopPhase = 'IDLE'; // 'IDLE', 'TRANSITION_TO_SIGN', 'HOLD_SIGN', 'TRANSITION_TO_IDLE'
        let phaseTime = 0.0;
        let activeGesture = "OPEN_PALM";
        
        // Joint target rotation states for interpolation
        let currentLeftRotations = {};
        let currentRightRotations = {};

        // Detailed finger joints rotation mapping for GSL Signs
        const GSL_SIGN_POSTURES = {
            "OPEN_PALM": { thumb: 0.1, index: 0.1, middle: 0.1, ring: 0.1, pinky: 0.1 },
            "CLOSED_FIST": { thumb: 1.3, index: 1.3, middle: 1.3, ring: 1.3, pinky: 1.3 },
            "POINTING": { thumb: 1.3, index: 0.1, middle: 1.3, ring: 1.3, pinky: 1.3 },
            "THUMBS_UP": { thumb: 0.1, index: 1.3, middle: 1.3, ring: 1.3, pinky: 1.3 },
            "AKWAABA": { thumb: 0.3, index: 0.3, middle: 0.3, ring: 0.3, pinky: 0.3 },
            "THANK_YOU": { thumb: 0.1, index: 0.1, middle: 0.1, ring: 0.1, pinky: 0.1 },
            "LETTER_A": { thumb: 0.3, index: 1.3, middle: 1.3, ring: 1.3, pinky: 1.3 },
            "LETTER_B": { thumb: 1.3, index: 0.1, middle: 0.1, ring: 0.1, pinky: 0.1 },
            "LETTER_C": { thumb: 0.7, index: 0.7, middle: 0.7, ring: 0.7, pinky: 0.7 }
        };

        const IDLE_RELAXED = { thumb: 0.2, index: 0.3, middle: 0.3, ring: 0.3, pinky: 0.3 };

        function init() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.2, 3.0);

            // High Quality Organic Studio Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 2.0);
            scene.add(ambientLight);

            const mainLight = new THREE.DirectionalLight(0xffffff, 2.4);
            mainLight.position.set(3, 5, 4);
            scene.add(mainLight);

            const fillLight = new THREE.DirectionalLight(0x38bdf8, 1.6);
            fillLight.position.set(-3, 3, -3);
            scene.add(fillLight);

            const bottomLight = new THREE.DirectionalLight(0xfacc15, 1.0);
            bottomLight.position.set(0, -2, 2);
            scene.add(bottomLight);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.target.set(0, 1.0, 0);

            // Stable Ground Pedestal Platform
            const pedestalGeo = new THREE.CylinderGeometry(0.85, 0.95, 0.06, 32);
            const pedestalMat = new THREE.MeshStandardMaterial({
                color: 0x1e293b,
                roughness: 0.3,
                metalness: 0.7
            });
            groundPedestal = new THREE.Mesh(pedestalGeo, pedestalMat);
            groundPedestal.position.set(0, 0, 0);
            scene.add(groundPedestal);

            // Pedestal Accent Ring
            const ringGeo = new THREE.RingGeometry(0.86, 0.94, 32);
            const ringMat = new THREE.MeshBasicMaterial({
                color: 0x38bdf8,
                side: THREE.DoubleSide
            });
            const ringMesh = new THREE.Mesh(ringGeo, ringMat);
            ringMesh.rotation.x = Math.PI / 2;
            ringMesh.position.set(0, 0.035, 0);
            scene.add(ringMesh);

            // 1. Build Two Beautifully Sculpted Rigged 3D Human Hands (Left & Right)
            buildHumanHands();

            const gltfLoader = new THREE.GLTFLoader();
            const fbxLoader = new THREE.FBXLoader();

            // 2. Load 3D Full Body Avatar (avatar.glb)
            gltfLoader.load('avatar.glb', function (gltf) {
                const loadingElem = document.getElementById('loading');
                if (loadingElem) loadingElem.style.display = 'none';
                
                fullAvatarModel = gltf.scene;
                
                const box = new THREE.Box3().setFromObject(fullAvatarModel);
                const size = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());
                
                fullAvatarModel.position.sub(center);
                fullAvatarModel.position.y += size.y / 2.0 + 0.03;

                scene.add(fullAvatarModel);

                mixer = new THREE.AnimationMixer(fullAvatarModel);

                // Load Breathing Idle
                fbxLoader.load('Breathing Idle.fbx', function (fbx) {
                    if (fbx.animations.length > 0) {
                        idleAction = mixer.clipAction(fbx.animations[0]);
                        idleAction.play();
                    }
                });

                // Load Waving Gesture
                fbxLoader.load('Waving Gesture.fbx', function (fbx) {
                    if (fbx.animations.length > 0) {
                        waveAction = mixer.clipAction(fbx.animations[0]);
                        setTimeout(waveHand, 1500);
                    }
                });

                if (waveIntervalTimer) clearInterval(waveIntervalTimer);
                waveIntervalTimer = setInterval(() => {
                    if (currentMode === 'FULL_BODY') {
                        waveHand();
                    }
                }, 10000);

                animate();
            }, undefined, function (error) {
                console.error('Error loading avatar.glb:', error);
            });

            window.addEventListener('resize', onWindowResize);
        }

        // Construct two organic-looking human hands with warm skin tones and smoothed mesh shapes
        function buildHumanHands() {
            // Organic Warm Human Skin Material
            const skinMaterial = new THREE.MeshStandardMaterial({
                color: 0xe2a884, // Warm natural human skin tone
                roughness: 0.65,
                metalness: 0.08,
                bumpScale: 0.02
            });

            // Joint Highlight Materials (Cyan Accent joints)
            const jointMaterial = new THREE.MeshStandardMaterial({
                color: 0x38bdf8,
                roughness: 0.2,
                metalness: 0.8
            });

            function buildSingleHand(isRight) {
                const handGroup = new THREE.Group();
                const jointsMap = {};

                const sideSign = isRight ? 1 : -1;

                // Sculpted Palm mesh (Beveled Box)
                const palmGeo = new THREE.BoxGeometry(0.32, 0.38, 0.09);
                const palmMesh = new THREE.Mesh(palmGeo, skinMaterial);
                handGroup.add(palmMesh);

                // Wrist base
                const wristGeo = new THREE.CylinderGeometry(0.09, 0.11, 0.2, 16);
                const wristMesh = new THREE.Mesh(wristGeo, skinMaterial);
                wristMesh.position.set(0, -0.28, 0);
                handGroup.add(wristMesh);

                // Helper to add finger with natural joints
                function addFinger(name, posX, startY, scaleFactor) {
                    const segments = [];
                    let parentNode = handGroup;
                    let currentY = startY;

                    const lengthMCP = 0.14 * scaleFactor;
                    const lengthPIP = 0.11 * scaleFactor;
                    const lengthDIP = 0.08 * scaleFactor;
                    const lengths = [lengthMCP, lengthPIP, lengthDIP];

                    for (let i = 0; i < 3; i++) {
                        const jointNode = new THREE.Group();
                        jointNode.position.set(posX * sideSign, i === 0 ? currentY : lengths[i - 1], 0);

                        // Organic smooth joint node
                        const jointSphere = new THREE.Mesh(
                            new THREE.SphereGeometry(0.038, 16, 16),
                            jointMaterial
                        );
                        jointNode.add(jointSphere);

                        // Soft organic finger bone cylinder
                        const boneGeo = new THREE.CylinderGeometry(0.025, 0.022, lengths[i], 16);
                        boneGeo.translate(0, lengths[i] / 2.0, 0);
                        const boneMesh = new THREE.Mesh(boneGeo, skinMaterial);
                        jointNode.add(boneMesh);

                        parentNode.add(jointNode);
                        parentNode = jointNode;
                        segments.push(jointNode);

                        posX = 0; // Align child joints directly above parent joint
                    }

                    jointsMap[name] = segments;
                }

                // Attach 5 fingers with custom sizing
                addFinger('thumb', 0.18, 0.0, 0.95);
                addFinger('index', 0.12, 0.2, 1.0);
                addFinger('middle', 0.04, 0.22, 1.05);
                addFinger('ring', -0.04, 0.2, 1.0);
                addFinger('pinky', -0.12, 0.16, 0.9);

                return { group: handGroup, joints: jointsMap };
            }

            // Create Left Hand
            const leftData = buildSingleHand(false);
            leftHandModel = leftData.group;
            leftJoints = leftData.joints;
            leftHandModel.position.set(-0.20, 0.8, 0);
            leftHandModel.visible = false;
            scene.add(leftHandModel);

            // Create Right Hand
            const rightData = buildSingleHand(true);
            rightHandModel = rightData.group;
            rightJoints = rightData.joints;
            rightHandModel.position.set(0.20, 0.8, 0);
            rightHandModel.visible = false;
            scene.add(rightHandModel);
        }

        // Applies looping transitions between idle and target GSL poses
        function updateLoopingHandAnimations(delta) {
            phaseTime += delta;

            let targetLeft = IDLE_RELAXED;
            let targetRight = IDLE_RELAXED;

            const targetPose = GSL_SIGN_POSTURES[activeGesture] || GSL_SIGN_POSTURES["OPEN_PALM"];

            // 1. Looping State Machine
            if (loopPhase === 'IDLE') {
                targetLeft = IDLE_RELAXED;
                targetRight = IDLE_RELAXED;
                if (phaseTime >= 2.0) {
                    loopPhase = 'TRANSITION_TO_SIGN';
                    phaseTime = 0.0;
                }
            } else if (loopPhase === 'TRANSITION_TO_SIGN') {
                const t = Math.min(phaseTime / 1.5, 1.0);
                targetLeft = lerpPostures(IDLE_RELAXED, targetPose, t);
                targetRight = lerpPostures(IDLE_RELAXED, targetPose, t);
                if (phaseTime >= 1.5) {
                    loopPhase = 'HOLD_SIGN';
                    phaseTime = 0.0;
                }
            } else if (loopPhase === 'HOLD_SIGN') {
                targetLeft = targetPose;
                targetRight = targetPose;
                if (phaseTime >= 2.5) {
                    loopPhase = 'TRANSITION_TO_IDLE';
                    phaseTime = 0.0;
                }
            } else if (loopPhase === 'TRANSITION_TO_IDLE') {
                const t = Math.min(phaseTime / 1.5, 1.0);
                targetLeft = lerpPostures(targetPose, IDLE_RELAXED, t);
                targetRight = lerpPostures(targetPose, IDLE_RELAXED, t);
                if (phaseTime >= 1.5) {
                    loopPhase = 'IDLE';
                    phaseTime = 0.0;
                }
            }

            // 2. Apply computed target rotations to Left & Right Hand models
            applyPostureToHand(leftJoints, targetLeft);
            applyPostureToHand(rightJoints, targetRight);
        }

        function lerpPostures(start, end, t) {
            const result = {};
            for (let finger in start) {
                result[finger] = start[finger] + (end[finger] - start[finger]) * t;
            }
            return result;
        }

        function applyPostureToHand(handJointsMap, posture) {
            for (let finger in handJointsMap) {
                const val = posture[finger] || 0.1;
                const joints = handJointsMap[finger];
                joints.forEach((joint) => {
                    if (finger === 'thumb') {
                        joint.rotation.z = -val * 0.4;
                        joint.rotation.x = val * 0.3;
                    } else {
                        joint.rotation.x = val;
                    }
                });
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            
            if (mixer && currentMode === 'FULL_BODY') mixer.update(delta);
            
            // Loop transitions for Left & Right Hands when zoomed in
            if (currentMode === 'ARMS') {
                updateLoopingHandAnimations(delta);
                
                // Breath-like rotation offsets on hands for organic feel
                if (leftHandModel) leftHandModel.rotation.y = Math.sin(clock.getElapsedTime() * 1.5) * 0.1;
                if (rightHandModel) rightHandModel.rotation.y = -Math.sin(clock.getElapsedTime() * 1.5) * 0.1;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        function zoomToHands(zoomIn) {
            currentMode = zoomIn ? 'ARMS' : 'FULL_BODY';

            if (zoomIn) {
                if (fullAvatarModel) fullAvatarModel.visible = false;
                if (groundPedestal) groundPedestal.visible = false;
                
                if (leftHandModel) leftHandModel.visible = true;
                if (rightHandModel) rightHandModel.visible = true;
                
                // Reset looping sign animation
                loopPhase = 'IDLE';
                phaseTime = 0.0;
                
                camera.position.set(0, 0.85, 1.6);
                controls.target.set(0, 0.85, 0);
            } else {
                if (leftHandModel) leftHandModel.visible = false;
                if (rightHandModel) rightHandModel.visible = false;
                if (fullAvatarModel) fullAvatarModel.visible = true;
                if (groundPedestal) groundPedestal.visible = true;
                
                camera.position.set(0, 1.2, 3.0);
                controls.target.set(0, 1.0, 0);
            }
        }

        function setGesture(gestureName) {
            activeGesture = gestureName;
            // Force morph restart on new sign selection
            loopPhase = 'TRANSITION_TO_SIGN';
            phaseTime = 0.0;
        }

        function waveHand() {
            if (waveAction && currentMode === 'FULL_BODY') {
                if (idleAction) idleAction.fadeOut(0.3);
                waveAction.reset().fadeIn(0.3).play();
                setTimeout(() => {
                    waveAction.fadeOut(0.3);
                    if (idleAction) idleAction.reset().fadeIn(0.3).play();
                }, 2200);
            }
        }

        init();
    </script>
</body>
</html>
