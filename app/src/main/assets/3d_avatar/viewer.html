<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #0f172a; }
        #canvas-container { width: 100vw; height: 100vh; }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #facc15; font-family: sans-serif; font-weight: bold; font-size: 16px; text-align: center;
        }
    </style>
</head>
<body>
    <div id="loading">⚡ Loading 3D Mesh Avatar (avatar.glb)...</div>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, model, controls;
        let isZoomedIn = false;
        let clock = new THREE.Clock();

        function init() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.2, 2.8);

            // Studio Lighting for 3D Mesh Avatar
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.4);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 1.8);
            dirLight.position.set(2, 4, 3);
            scene.add(dirLight);

            const fillLight = new THREE.DirectionalLight(0x38bdf8, 1.0);
            fillLight.position.set(-2, 2, -3);
            scene.add(fillLight);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.target.set(0, 1.0, 0);

            // Load actual 3D avatar.glb model file
            const loader = new THREE.GLTFLoader();
            loader.load('avatar.glb', function (gltf) {
                const loadingElem = document.getElementById('loading');
                if (loadingElem) loadingElem.style.display = 'none';
                
                model = gltf.scene;
                
                // Auto-center and scale model
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());
                
                model.position.sub(center);
                model.position.y += size.y / 2.0;

                scene.add(model);

                // Initial friendly waving greeting
                setTimeout(waveHand, 1200);

                animate();
            }, undefined, function (error) {
                console.error('An error occurred loading avatar.glb:', error);
                const loadingElem = document.getElementById('loading');
                if (loadingElem) loadingElem.innerText = 'Error loading 3D avatar.glb model';
            });

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            if (model) {
                // Real 3D Idle Breathing Motion
                model.position.y = (model.position.y || 0) + Math.sin(time * 2) * 0.001;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        function zoomToHands(zoomIn) {
            isZoomedIn = zoomIn;
            const targetY = zoomIn ? 1.25 : 1.0;
            const targetZ = zoomIn ? 1.1 : 2.8;

            let startZ = camera.position.z;
            let startTime = performance.now();

            function step(currentTime) {
                let elapsed = (currentTime - startTime) / 800;
                if (elapsed > 1) elapsed = 1;

                camera.position.z = startZ + (targetZ - startZ) * elapsed;
                controls.target.set(0, targetY, 0);

                if (elapsed < 1) requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }

        function waveHand() {
            if (!model) return;
            let startTime = performance.now();
            function waveStep(now) {
                let elapsed = (now - startTime) / 1000;
                if (elapsed < 1.8) {
                    model.rotation.y = Math.sin(elapsed * 10) * 0.2;
                    requestAnimationFrame(waveStep);
                } else {
                    model.rotation.y = 0;
                }
            }
            requestAnimationFrame(waveStep);
        }

        init();
    </script>
</body>
</html>
