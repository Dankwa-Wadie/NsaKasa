<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #0f172a; }
        #canvas-container { width: 100vw; height: 100vh; }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #facc15; font-family: sans-serif; font-weight: bold; font-size: 16px; text-align: center;
        }
    </style>
</head>
<body>
    <div id="loading">⚡ Loading Rigged 3D Avatar & Rigged Arms...</div>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/fflate.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls;
        let fullAvatarModel = null;
        let armsModel = null;
        let mixer, idleAction, waveAction;
        let clock = new THREE.Clock();
        let currentMode = 'FULL_BODY';

        function init() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.2, 2.8);

            // Studio Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 2.0);
            dirLight.position.set(2, 4, 3);
            scene.add(dirLight);

            const fillLight = new THREE.DirectionalLight(0x38bdf8, 1.2);
            fillLight.position.set(-2, 2, -3);
            scene.add(fillLight);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.target.set(0, 1.0, 0);

            const gltfLoader = new THREE.GLTFLoader();
            const fbxLoader = new THREE.FBXLoader();
            const textureLoader = new THREE.TextureLoader();

            // Load 3D avatar.glb model file
            gltfLoader.load('avatar.glb', function (gltf) {
                const loadingElem = document.getElementById('loading');
                if (loadingElem) loadingElem.style.display = 'none';
                
                fullAvatarModel = gltf.scene;
                
                const box = new THREE.Box3().setFromObject(fullAvatarModel);
                const size = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());
                
                fullAvatarModel.position.sub(center);
                fullAvatarModel.position.y += size.y / 2.0;

                scene.add(fullAvatarModel);

                mixer = new THREE.AnimationMixer(fullAvatarModel);

                // Load Breathing Idle.fbx movement
                fbxLoader.load('Breathing Idle.fbx', function (fbx) {
                    if (fbx.animations.length > 0) {
                        idleAction = mixer.clipAction(fbx.animations[0]);
                        idleAction.play();
                    }
                });

                // Load Waving Gesture.fbx movement
                fbxLoader.load('Waving Gesture.fbx', function (fbx) {
                    if (fbx.animations.length > 0) {
                        waveAction = mixer.clipAction(fbx.animations[0]);
                        setTimeout(waveHand, 1500);
                    }
                });

                animate();
            }, undefined, function (error) {
                console.error('Error loading avatar.glb:', error);
            });

            // Load Fully Rigged 3D Arms from arms/ folder
            const armAlbedo = textureLoader.load('arms/Textures/T_arms_A.png');
            const armNormal = textureLoader.load('arms/Textures/T_arms_N.png');

            fbxLoader.load('arms/arms.fbx', function (fbx) {
                armsModel = fbx;
                armsModel.scale.set(0.015, 0.015, 0.015);
                armsModel.position.set(0, 1.1, 0.2);
                armsModel.rotation.set(0, 0, 0);

                armsModel.traverse((child) => {
                    if (child.isMesh) {
                        child.material = new THREE.MeshStandardMaterial({
                            map: armAlbedo,
                            normalMap: armNormal,
                            roughness: 0.35,
                            metalness: 0.05
                        });
                    }
                });

                armsModel.visible = false;
                scene.add(armsModel);
            }, undefined, function (error) {
                console.log('FBX arms loading fallback to OBJ arms...');
            });

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            
            if (mixer && currentMode === 'FULL_BODY') mixer.update(delta);
            
            // Idle breathing effect on Rigged Arms when active
            if (armsModel && armsModel.visible) {
                armsModel.position.y = 1.1 + Math.sin(clock.getElapsedTime() * 2) * 0.01;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        function zoomToHands(zoomIn) {
            currentMode = zoomIn ? 'ARMS' : 'FULL_BODY';

            if (zoomIn) {
                if (fullAvatarModel) fullAvatarModel.visible = false;
                if (armsModel) armsModel.visible = true;
                camera.position.set(0, 1.25, 1.2);
                controls.target.set(0, 1.2, 0);
            } else {
                if (armsModel) armsModel.visible = false;
                if (fullAvatarModel) fullAvatarModel.visible = true;
                camera.position.set(0, 1.2, 2.8);
                controls.target.set(0, 1.0, 0);
            }
        }

        function waveHand() {
            if (waveAction && currentMode === 'FULL_BODY') {
                if (idleAction) idleAction.fadeOut(0.3);
                waveAction.reset().fadeIn(0.3).play();
                setTimeout(() => {
                    waveAction.fadeOut(0.3);
                    if (idleAction) idleAction.reset().fadeIn(0.3).play();
                }, 2200);
            }
        }

        init();
    </script>
</body>
</html>
