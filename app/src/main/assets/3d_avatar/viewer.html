<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #0f172a; }
        #canvas-container { width: 100vw; height: 100vh; }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #facc15; font-family: sans-serif; font-weight: bold; font-size: 16px; text-align: center;
        }
    </style>
</head>
<body>
    <div id="loading">⚡ Loading 3D Avatar & FBX Movements...</div>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/fflate.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, model, controls;
        let mixer, idleAction, waveAction;
        let clock = new THREE.Clock();

        function init() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.2, 2.8);

            // Studio Lighting for 3D Mesh Avatar
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.4);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 1.8);
            dirLight.position.set(2, 4, 3);
            scene.add(dirLight);

            const fillLight = new THREE.DirectionalLight(0x38bdf8, 1.0);
            fillLight.position.set(-2, 2, -3);
            scene.add(fillLight);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.target.set(0, 1.0, 0);

            // Load 3D avatar.glb model file from Avatar folder
            const gltfLoader = new THREE.GLTFLoader();
            gltfLoader.load('avatar.glb', function (gltf) {
                const loadingElem = document.getElementById('loading');
                if (loadingElem) loadingElem.style.display = 'none';
                
                model = gltf.scene;
                
                // Auto-center model
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());
                
                model.position.sub(center);
                model.position.y += size.y / 2.0;

                scene.add(model);

                // Setup Animation Mixer
                mixer = new THREE.AnimationMixer(model);

                // Load Breathing Idle.fbx movement from Avatar folder
                const fbxLoader = new THREE.FBXLoader();
                fbxLoader.load('Breathing Idle.fbx', function (fbx) {
                    if (fbx.animations.length > 0) {
                        idleAction = mixer.clipAction(fbx.animations[0]);
                        idleAction.play();
                    }
                });

                // Load Waving Gesture.fbx movement from Avatar folder
                fbxLoader.load('Waving Gesture.fbx', function (fbx) {
                    if (fbx.animations.length > 0) {
                        waveAction = mixer.clipAction(fbx.animations[0]);
                        // Play initial wave greeting after 1.5 seconds
                        setTimeout(waveHand, 1500);
                    }
                });

                animate();
            }, undefined, function (error) {
                console.error('Error loading avatar.glb:', error);
                const loadingElem = document.getElementById('loading');
                if (loadingElem) loadingElem.innerText = 'Error loading 3D avatar.glb model';
            });

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            
            if (mixer) mixer.update(delta);
            
            controls.update();
            renderer.render(scene, camera);
        }

        function zoomToHands(zoomIn) {
            const targetY = zoomIn ? 1.25 : 1.0;
            const targetZ = zoomIn ? 1.1 : 2.8;

            let startZ = camera.position.z;
            let startTime = performance.now();

            function step(currentTime) {
                let elapsed = (currentTime - startTime) / 800;
                if (elapsed > 1) elapsed = 1;

                camera.position.z = startZ + (targetZ - startZ) * elapsed;
                controls.target.set(0, targetY, 0);

                if (elapsed < 1) requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }

        function waveHand() {
            if (waveAction) {
                if (idleAction) idleAction.fadeOut(0.3);
                waveAction.reset().fadeIn(0.3).play();
                setTimeout(() => {
                    waveAction.fadeOut(0.3);
                    if (idleAction) idleAction.reset().fadeIn(0.3).play();
                }, 2200);
            }
        }

        init();
    </script>
</body>
</html>
