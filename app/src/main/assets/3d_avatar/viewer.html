<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #0f172a; }
        #canvas-container { width: 100vw; height: 100vh; }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #facc15; font-family: sans-serif; font-weight: bold; font-size: 15px; text-align: center;
        }
    </style>
</head>
<body>
    <div id="loading">⚡ Loading 3D Avatar, Pedestal & Rigged Arms...</div>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/fflate.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls;
        let fullAvatarModel = null;
        let armsModel = null;
        let groundPedestal = null;
        let mixer, idleAction, waveAction;
        let waveIntervalTimer = null;
        let clock = new THREE.Clock();
        let currentMode = 'FULL_BODY';

        function init() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.2, 3.0);

            // Studio Lighting Setup
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.8);
            scene.add(ambientLight);

            const mainLight = new THREE.DirectionalLight(0xffffff, 2.2);
            mainLight.position.set(3, 5, 4);
            scene.add(mainLight);

            const fillLight = new THREE.DirectionalLight(0x38bdf8, 1.4);
            fillLight.position.set(-3, 3, -3);
            scene.add(fillLight);

            const bottomLight = new THREE.DirectionalLight(0xfacc15, 0.8);
            bottomLight.position.set(0, -2, 2);
            scene.add(bottomLight);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.target.set(0, 1.0, 0);

            // 1. Stable Ground Pedestal Placeholder Platform
            const pedestalGeo = new THREE.CylinderGeometry(0.85, 0.95, 0.06, 32);
            const pedestalMat = new THREE.MeshStandardMaterial({
                color: 0x1e293b,
                roughness: 0.3,
                metalness: 0.7
            });
            groundPedestal = new THREE.Mesh(pedestalGeo, pedestalMat);
            groundPedestal.position.set(0, 0, 0);
            scene.add(groundPedestal);

            // Pedestal Glow Ring Accent
            const ringGeo = new THREE.RingGeometry(0.86, 0.94, 32);
            const ringMat = new THREE.MeshBasicMaterial({
                color: 0x38bdf8,
                side: THREE.DoubleSide
            });
            const ringMesh = new THREE.Mesh(ringGeo, ringMat);
            ringMesh.rotation.x = Math.PI / 2;
            ringMesh.position.set(0, 0.035, 0);
            scene.add(ringMesh);

            const gltfLoader = new THREE.GLTFLoader();
            const fbxLoader = new THREE.FBXLoader();
            const textureLoader = new THREE.TextureLoader();

            // 2. Load 3D Full Body Avatar (avatar.glb)
            gltfLoader.load('avatar.glb', function (gltf) {
                const loadingElem = document.getElementById('loading');
                if (loadingElem) loadingElem.style.display = 'none';
                
                fullAvatarModel = gltf.scene;
                
                // Align model precisely to standing pedestal
                const box = new THREE.Box3().setFromObject(fullAvatarModel);
                const size = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());
                
                fullAvatarModel.position.sub(center);
                fullAvatarModel.position.y += size.y / 2.0 + 0.03;

                scene.add(fullAvatarModel);

                mixer = new THREE.AnimationMixer(fullAvatarModel);

                // Load Breathing Idle.fbx movement
                fbxLoader.load('Breathing Idle.fbx', function (fbx) {
                    if (fbx.animations.length > 0) {
                        idleAction = mixer.clipAction(fbx.animations[0]);
                        idleAction.play();
                    }
                });

                // Load Waving Gesture.fbx movement
                fbxLoader.load('Waving Gesture.fbx', function (fbx) {
                    if (fbx.animations.length > 0) {
                        waveAction = mixer.clipAction(fbx.animations[0]);
                        // Initial wave greeting after 1.5 seconds
                        setTimeout(waveHand, 1500);
                    }
                });

                // Set automatic 10-second waving interval
                if (waveIntervalTimer) clearInterval(waveIntervalTimer);
                waveIntervalTimer = setInterval(() => {
                    if (currentMode === 'FULL_BODY') {
                        waveHand();
                    }
                }, 10000);

                animate();
            }, undefined, function (error) {
                console.error('Error loading avatar.glb:', error);
            });

            // 3. Load Fully Rigged 3D Arms (arms/arms.fbx)
            const armAlbedo = textureLoader.load('arms/Textures/T_arms_A.png');
            const armNormal = textureLoader.load('arms/Textures/T_arms_N.png');

            fbxLoader.load('arms/arms.fbx', function (fbx) {
                armsModel = fbx;
                
                // Center and scale arms model perfectly for close-up inspection
                const box = new THREE.Box3().setFromObject(armsModel);
                const size = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());
                
                armsModel.position.sub(center);
                
                // Auto-scale to fit viewport nicely
                const maxDim = Math.max(size.x, size.y, size.z);
                if (maxDim > 0) {
                    const targetScale = 1.0 / maxDim;
                    armsModel.scale.set(targetScale, targetScale, targetScale);
                }
                
                armsModel.position.set(0, 0.9, 0);

                armsModel.traverse((child) => {
                    if (child.isMesh) {
                        child.material = new THREE.MeshStandardMaterial({
                            map: armAlbedo,
                            normalMap: armNormal,
                            roughness: 0.35,
                            metalness: 0.05,
                            side: THREE.DoubleSide
                        });
                    }
                });

                armsModel.visible = false;
                scene.add(armsModel);
            }, undefined, function (error) {
                console.log('Rigged arms loading status:', error);
            });

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            
            if (mixer && currentMode === 'FULL_BODY') mixer.update(delta);
            
            // Continuous breathing motion on Rigged Arms when active
            if (armsModel && armsModel.visible) {
                armsModel.position.y = 0.9 + Math.sin(clock.getElapsedTime() * 2.5) * 0.015;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        function zoomToHands(zoomIn) {
            currentMode = zoomIn ? 'ARMS' : 'FULL_BODY';

            if (zoomIn) {
                if (fullAvatarModel) fullAvatarModel.visible = false;
                if (groundPedestal) groundPedestal.visible = false;
                if (armsModel) armsModel.visible = true;
                
                camera.position.set(0, 0.9, 1.5);
                controls.target.set(0, 0.9, 0);
            } else {
                if (armsModel) armsModel.visible = false;
                if (fullAvatarModel) fullAvatarModel.visible = true;
                if (groundPedestal) groundPedestal.visible = true;
                
                camera.position.set(0, 1.2, 3.0);
                controls.target.set(0, 1.0, 0);
            }
        }

        function waveHand() {
            if (waveAction && currentMode === 'FULL_BODY') {
                if (idleAction) idleAction.fadeOut(0.3);
                waveAction.reset().fadeIn(0.3).play();
                setTimeout(() => {
                    waveAction.fadeOut(0.3);
                    if (idleAction) idleAction.reset().fadeIn(0.3).play();
                }, 2200);
            }
        }

        init();
    </script>
</body>
</html>
